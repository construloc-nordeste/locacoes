<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Construloc Nordeste</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ededed;
}

header {
  text-align: center;
  padding: 20px;
  background: white;
}

header img {
  width: 180px;
}

h1 {
  font-family: 'Anton', sans-serif;
  color: #818286;
  margin: 10px 0 0;
}

.container {
  max-width: 600px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.equipamento {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 15px;
  border-bottom: 1px solid #ededed;
  padding-bottom: 10px;
}

.equipamento img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
}

.equipamento span {
  flex: 1;
  margin-left: 10px;
}

input[type="number"] {
  width: 60px;
}

button {
  width: 100%;
  padding: 15px;
  background: #feed3d;
  border: none;
  color: black;
  font-weight: bold;
  font-size: 16px;
  border-radius: 8px;
  margin-top: 20px;
  cursor: pointer;
}

button:hover {
  background: #fbc304;
}

.whatsapp {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #25D366;
  color: white;
  padding: 12px;
  border-radius: 50px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Construloc">
</header>

<div class="container">

<h2>Escolha os equipamentos</h2>

<!-- MODELO DE ITEM -->
<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Martelete 30kg</span>
  <input type="number" id="martelete">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Escora</span>
  <input type="number" id="escora">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Andaime</span>
  <input type="number" id="andaime">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Betoneira</span>
  <input type="number" id="betoneira">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Compactador de solo</span>
  <input type="number" id="compactador">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Lixadeira e politriz</span>
  <input type="number" id="lixadeira">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Lavadora de alta pressão</span>
  <input type="number" id="lavadora">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Aparador de grama</span>
  <input type="number" id="aparador">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Bomba de água</span>
  <input type="number" id="bomba">
</div>

<div class="equipamento">
  <img src="https://via.placeholder.com/60">
  <span>Pistola elétrica para pintura</span>
  <input type="number" id="pistola">
</div>

<button onclick="enviarWhats()">Solicitar Orçamento</button>

</div>

<a class="whatsapp" href="https://wa.me/message/WKSBFVAUVKUZI1" target="_blank">
  WhatsApp
</a>

<script>
function enviarWhats() {

  let msg = "Olá! Vim pelo site da Construloc Nordeste.%0A%0A";

  function add(nome, id){
    let valor = document.getElementById(id).value;
    if(valor > 0){
      msg += nome + ": " + valor + "%0A";
    }
  }

  add("Martelete 30kg", "martelete");
  add("Escora", "escora");
  add("Andaime", "andaime");
  add("Betoneira", "betoneira");
  add("Compactador de solo", "compactador");
  add("Lixadeira e politriz", "lixadeira");
  add("Lavadora de alta pressão", "lavadora");
  add("Aparador de grama", "aparador");
  add("Bomba de água", "bomba");
  add("Pistola elétrica", "pistola");

  let url = "https://wa.me/5584999999999?text=" + msg;

  window.open(url, "_blank");
}
</script>

</body>
</html>
