<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Aluguel de Equipamentos</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Escolha os equipamentos</h2>

  <label><input type="checkbox" value="Betoneira"> Betoneira</label><br>
  <label><input type="checkbox" value="Martelete"> Martelete</label><br>
  <label><input type="checkbox" value="Lava-jato"> Lava-jato</label><br>
  <label><input type="checkbox" value="Compactador"> Compactador</label><br>

  <h3>Dias de aluguel</h3>
  <input type="number" id="dias" placeholder="Ex: 3" style="width:100%; padding:8px;">

  <button onclick="enviarWhats()">Finalizar no WhatsApp</button>
</div>

<script>
function enviarWhats() {
  let equipamentos = [];
  document.querySelectorAll('input[type=checkbox]:checked').forEach(el => {
    equipamentos.push("- " + el.value);
  });

  let dias = document.getElementById("dias").value;

  let mensagem = "Olá! Quero alugar:%0A";
  mensagem += equipamentos.join("%0A");
  mensagem += "%0A Dias: " + dias;

  let numero = "5584SEUNUMERO"; // coloque seu número aqui

  let url = "https://wa.me/" + numero + "?text=" + mensagem;

  window.open(url, "_blank");
}
</script>

</body>
</html>
